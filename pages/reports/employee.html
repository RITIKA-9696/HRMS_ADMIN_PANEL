<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Report | Reports | HRMS Admin</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background-color: #f3eeef; }
        
        .section-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #5c003f;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .btn-primary {
            background-color: #540863;
            transition: all 0.3s ease;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
        }
        .btn-primary:hover { background-color: #92487A; transform: translateY(-1px); }
        
        .btn-outline {
            border: 1px solid #540863;
            color: #540863;
            padding: 8px 16px;
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
        }
        .btn-outline:hover { background-color: #540863; color: white; }
        
        input, select {
            border: 1px solid #5c003f;
            border-radius: 8px;
            padding: 8px 12px;
            width: 100%;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #540863;
            box-shadow: 0 0 0 2px rgba(84, 8, 99, 0.1);
        }
        
        label {
            font-size: 13px;
            font-weight: 500;
            color: #540863;
            margin-bottom: 4px;
            display: block;
        }
        
        /* Submodule Navigation */
        .submodule-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #5c003f;
            flex-wrap: wrap;
        }
        
        .submodule-link {
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            background: transparent;
            color: #92487A;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        
        .submodule-link:hover {
            background-color: rgba(84, 8, 99, 0.1);
            color: #540863;
        }
        
        .submodule-link.active {
            background-color: #540863;
            color: white;
        }
        
        .report-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .report-table th, .report-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }
        .report-table th {
            background-color: #f8f0f2;
            color: #540863;
            font-weight: 600;
        }
        .report-table tr:hover { background-color: rgba(84, 8, 99, 0.05); }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            z-index: 1100;
            animation: slideIn 0.3s ease;
        }
        .toast.success { background-color: #28a745; }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .main-content { margin-top: 64px; }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #f3eeef; }
        ::-webkit-scrollbar-thumb { background: #92487A; border-radius: 10px; }
        
        @media (max-width: 768px) {
            .section-card { padding: 16px; }
            .submodule-link { padding: 6px 12px; font-size: 12px; }
            .form-row { grid-template-columns: 1fr; }
            .report-table { font-size: 11px; }
            .report-table th, .report-table td { padding: 6px; }
        }
    </style>
</head>
<body class="bg-[#f3eeef]">
    
    <div class="flex h-screen overflow-hidden">
        <div id="sidebar-container"></div>
        
        <div class="flex-1 flex flex-col overflow-hidden">
            <div id="header-container"></div>
            
            <main class="flex-1 overflow-y-auto p-5 main-content">
                
                <!-- Page Header -->
                <div class="mb-4">
                    <h1 class="text-xl font-bold" style="color: #540863;">Reports & Analytics</h1>
                    <p class="text-xs mt-0.5" style="color: #92487A;">Generate and export comprehensive reports</p>
                </div>
                
                <!-- Submodule Navigation -->
                <div class="submodule-nav">
                    <a href="/pages/reports/employee.html" class="submodule-link active">📊 Employee Report</a>
                    <a href="/pages/reports/attendance.html" class="submodule-link">⏱️ Attendance Report</a>
                    <a href="/pages/reports/leave.html" class="submodule-link">🌴 Leave Report</a>
                    <a href="/pages/reports/salary.html" class="submodule-link">💰 Salary Report</a>
                </div>
                
                <!-- Employee Report Content -->
                <div class="section-card">
                    <h3 class="text-md font-semibold mb-4" style="color:#540863;">Employee Report</h3>
                    <div class="form-row">
                        <div><label>Department</label>
                            <select id="empDept">
                                <option value="all">All Departments</option>
                                <option>Information Technology</option>
                                <option>Human Resources</option>
                                <option>Sales & Marketing</option>
                                <option>Finance & Accounts</option>
                                <option>Operations</option>
                            </select>
                        </div>
                        <div><label>Employment Type</label>
                            <select id="empType">
                                <option value="all">All Types</option>
                                <option>Permanent</option>
                                <option>Contract</option>
                                <option>Intern</option>
                                <option>Probation</option>
                            </select>
                        </div>
                        <div><label>Status</label>
                            <select id="empStatus">
                                <option value="all">All Status</option>
                                <option>Active</option>
                                <option>Inactive</option>
                                <option>On Leave</option>
                                <option>Notice Period</option>
                            </select>
                        </div>
                        <div><label>Sort By</label>
                            <select id="empSort">
                                <option>Name</option>
                                <option>Joining Date</option>
                                <option>Department</option>
                            </select>
                        </div>
                    </div>
                    <div class="flex justify-end gap-3">
                        <button onclick="generateReport()" class="btn-primary"><i class="fas fa-chart-line mr-2"></i>Generate Report</button>
                        <button onclick="exportReport()" class="btn-outline"><i class="fas fa-download mr-2"></i>Export Excel</button>
                        <button onclick="printReport()" class="btn-outline"><i class="fas fa-print mr-2"></i>Print</button>
                    </div>
                </div>
                
                <!-- Report Preview -->
                <div id="reportPreview" class="section-card" style="display: none;">
                    <h3 class="text-md font-semibold mb-3" style="color:#540863;">Employee Report Preview</h3>
                    <div id="reportContent"></div>
                </div>
                
            </main>
        </div>
    </div>
    
    <script src="../../assets/js/common.js"></script>
    <script src="../../assets/js/sidebar.js"></script>
    <script src="../../assets/js/header.js"></script>
    
    <script>
        function generateReport() {
            const dept = document.getElementById('empDept').value;
            const type = document.getElementById('empType').value;
            const status = document.getElementById('empStatus').value;
            
            const employeeData = [
                { name: 'Rajesh Kumar', dept: 'Information Technology', designation: 'Senior Developer', joining: '2020-01-15', status: 'Active', type: 'Permanent', email: 'rajesh@hrms.com', phone: '+91 98765 43210' },
                { name: 'Priya Sharma', dept: 'Human Resources', designation: 'HR Manager', joining: '2019-06-10', status: 'Active', type: 'Permanent', email: 'priya@hrms.com', phone: '+91 98765 43211' },
                { name: 'Amit Mehta', dept: 'Sales & Marketing', designation: 'Sales Manager', joining: '2018-03-20', status: 'Active', type: 'Permanent', email: 'amit@hrms.com', phone: '+91 98765 43212' },
                { name: 'Neha Gupta', dept: 'Finance & Accounts', designation: 'Finance Head', joining: '2021-01-05', status: 'Active', type: 'Permanent', email: 'neha@hrms.com', phone: '+91 98765 43213' },
                { name: 'Vikram Singh', dept: 'Operations', designation: 'Operations Head', joining: '2017-11-12', status: 'Active', type: 'Permanent', email: 'vikram@hrms.com', phone: '+91 98765 43214' }
            ];
            
            let filteredData = employeeData;
            if (dept !== 'all') filteredData = filteredData.filter(e => e.dept === dept);
            if (type !== 'all') filteredData = filteredData.filter(e => e.type === type);
            if (status !== 'all') filteredData = filteredData.filter(e => e.status === status);
            
            let tableHtml = `<table class="report-table"><thead><tr><th>Employee Name</th><th>Department</th><th>Designation</th><th>Joining Date</th><th>Status</th><th>Email</th><th>Phone</th></tr></thead><tbody>`;
            filteredData.forEach(emp => {
                tableHtml += `<tr><td>${emp.name}</td><td>${emp.dept}</td><td>${emp.designation}</td><td>${emp.joining}</td><td><span class="text-xs px-2 py-1 rounded-full" style="background:rgba(40,167,69,0.2);color:#155724;">${emp.status}</span></td><td>${emp.email}</td><td>${emp.phone}</td></tr>`;
            });
            tableHtml += `</tbody></table><div class="mt-3 text-right"><p class="text-sm text-gray-500">Total Employees: ${filteredData.length}</p></div>`;
            
            document.getElementById('reportContent').innerHTML = tableHtml;
            document.getElementById('reportPreview').style.display = 'block';
            showToast('Employee report generated!', 'success');
        }
        
        function exportReport() { showToast('Report exported!', 'success'); }
        function printReport() { window.print(); }
        
        function showToast(message, type) { const toast = document.createElement('div'); toast.className = `toast ${type}`; toast.innerHTML = message; document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000); }
        
        function setActiveMenu(module) { setTimeout(() => { document.querySelectorAll('.nav-link').forEach(link => { link.classList.remove('active'); if(link.getAttribute('data-module') === module) link.classList.add('active'); }); }, 500); }
        
        document.addEventListener('DOMContentLoaded', function() { loadSidebar(); loadHeader(); setActiveMenu('reports'); });
    </script>
</body>
</html>
