<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Report | Reports | HRMS Admin</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background-color: #f3eeef; }
        
        .section-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #5c003f;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .btn-primary {
            background-color: #540863;
            transition: all 0.3s ease;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
        }
        .btn-primary:hover { background-color: #92487A; transform: translateY(-1px); }
        
        .btn-outline {
            border: 1px solid #540863;
            color: #540863;
            padding: 8px 16px;
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
        }
        .btn-outline:hover { background-color: #540863; color: white; }
        
        input, select {
            border: 1px solid #5c003f;
            border-radius: 8px;
            padding: 8px 12px;
            width: 100%;
        }
        
        label {
            font-size: 13px;
            font-weight: 500;
            color: #540863;
            margin-bottom: 4px;
            display: block;
        }
        
        .submodule-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #5c003f;
            flex-wrap: wrap;
        }
        
        .submodule-link {
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            background: transparent;
            color: #92487A;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        
        .submodule-link:hover { background-color: rgba(84, 8, 99, 0.1); color: #540863; }
        .submodule-link.active { background-color: #540863; color: white; }
        
        .report-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .report-table th, .report-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }
        .report-table th { background-color: #f8f0f2; color: #540863; font-weight: 600; }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }
        
        .pie-chart-container { max-width: 250px; margin: 0 auto; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            z-index: 1100;
            animation: slideIn 0.3s ease;
        }
        .toast.success { background-color: #28a745; }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .main-content { margin-top: 64px; }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #f3eeef; }
        ::-webkit-scrollbar-thumb { background: #92487A; border-radius: 10px; }
        
        @media (max-width: 768px) {
            .section-card { padding: 16px; }
            .submodule-link { padding: 6px 12px; font-size: 12px; }
            .form-row { grid-template-columns: 1fr; }
            .pie-chart-container { max-width: 180px; }
        }
    </style>
</head>
<body class="bg-[#f3eeef]">
    
    <div class="flex h-screen overflow-hidden">
        <div id="sidebar-container"></div>
        
        <div class="flex-1 flex flex-col overflow-hidden">
            <div id="header-container"></div>
            
            <main class="flex-1 overflow-y-auto p-5 main-content">
                
                <div class="mb-4">
                    <h1 class="text-xl font-bold" style="color: #540863;">Reports & Analytics</h1>
                    <p class="text-xs mt-0.5" style="color: #92487A;">Generate and export comprehensive reports</p>
                </div>
                
                <div class="submodule-nav">
                    <a href="/pages/reports/employee.html" class="submodule-link">📊 Employee Report</a>
                    <a href="/pages/reports/attendance.html" class="submodule-link">⏱️ Attendance Report</a>
                    <a href="/pages/reports/leave.html" class="submodule-link active">🌴 Leave Report</a>
                    <a href="/pages/reports/salary.html" class="submodule-link">💰 Salary Report</a>
                </div>
                
                <div class="section-card">
                    <h3 class="text-md font-semibold mb-4" style="color:#540863;">Leave Report</h3>
                    <div class="form-row">
                        <div><label>Department</label>
                            <select id="leaveDept">
                                <option value="all">All Departments</option>
                                <option>Information Technology</option>
                                <option>Human Resources</option>
                                <option>Sales & Marketing</option>
                                <option>Finance & Accounts</option>
                            </select>
                        </div>
                        <div><label>Leave Type</label>
                            <select id="leaveType">
                                <option value="all">All Types</option>
                                <option>Casual</option>
                                <option>Sick</option>
                                <option>Paid</option>
                                <option>Unpaid</option>
                            </select>
                        </div>
                        <div><label>Year</label>
                            <select id="leaveYear">
                                <option value="2024" selected>2024</option>
                                <option value="2023">2023</option>
                                <option value="2022">2022</option>
                            </select>
                        </div>
                        <div><label>Status</label>
                            <select id="leaveStatus">
                                <option value="all">All Status</option>
                                <option>Approved</option>
                                <option>Pending</option>
                                <option>Rejected</option>
                            </select>
                        </div>
                    </div>
                    <div class="flex justify-end gap-3">
                        <button onclick="generateReport()" class="btn-primary"><i class="fas fa-chart-line mr-2"></i>Generate Report</button>
                        <button onclick="exportReport()" class="btn-outline"><i class="fas fa-download mr-2"></i>Export Excel</button>
                        <button onclick="printReport()" class="btn-outline"><i class="fas fa-print mr-2"></i>Print</button>
                    </div>
                </div>
                
                <div class="section-card">
                    <h3 class="text-md font-semibold mb-3 text-center" style="color:#540863;">Leave Distribution by Type</h3>
                    <div class="pie-chart-container"><canvas id="leaveChart" height="180" width="180"></canvas></div>
                    <div class="flex justify-center gap-3 mt-3 flex-wrap">
                        <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full" style="background:#540863;"></div><span class="text-xs">Casual (35%)</span></div>
                        <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full" style="background:#92487A;"></div><span class="text-xs">Sick (28%)</span></div>
                        <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full" style="background:#E49BA6;"></div><span class="text-xs">Paid (25%)</span></div>
                        <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full" style="background:#FFD3D5;"></div><span class="text-xs">Unpaid (12%)</span></div>
                    </div>
                </div>
                
                <div id="reportPreview" class="section-card" style="display: none;">
                    <h3 class="text-md font-semibold mb-3" style="color:#540863;">Leave Report Preview</h3>
                    <div id="reportContent"></div>
                </div>
                
            </main>
        </div>
    </div>
    
    <script src="../../assets/js/common.js"></script>
    <script src="../../assets/js/sidebar.js"></script>
    <script src="../../assets/js/header.js"></script>
    
    <script>
        let leaveChart = null;
        
        function generateReport() {
            updateChart();
            const year = document.getElementById('leaveYear').value;
            const dept = document.getElementById('leaveDept').value;
            
            const leaveData = [
                { name: 'Rajesh Kumar', dept: 'Information Technology', casual: 3, sick: 2, paid: 5, total: 10 },
                { name: 'Priya Sharma', dept: 'Human Resources', casual: 2, sick: 1, paid: 3, total: 6 },
                { name: 'Amit Mehta', dept: 'Sales & Marketing', casual: 4, sick: 2, paid: 6, total: 12 }
            ];
            
            let filteredData = leaveData;
            if (dept !== 'all') filteredData = filteredData.filter(e => e.dept === dept);
            
            let tableHtml = `<table class="report-table"><thead><tr><th>Employee</th><th>Department</th><th>Casual</th><th>Sick</th><th>Paid</th><th>Total Leaves</th></tr></thead><tbody>`;
            filteredData.forEach(emp => {
                tableHtml += `<tr><td class="py-2">${emp.name}</td><td class="py-2">${emp.dept}</td><td class="py-2">${emp.casual}</td><td class="py-2">${emp.sick}</td><td class="py-2">${emp.paid}</td><td class="py-2"><strong>${emp.total}</strong></td></tr>`;
            });
            tableHtml += `</tbody></table><div class="mt-3 text-right"><p class="text-sm text-gray-500">Year: ${year} • Total Employees: ${filteredData.length}</p></div>`;
            
            document.getElementById('reportContent').innerHTML = tableHtml;
            document.getElementById('reportPreview').style.display = 'block';
            showToast('Leave report generated!', 'success');
        }
        
        function updateChart() {
            const ctx = document.getElementById('leaveChart').getContext('2d');
            if (leaveChart) leaveChart.destroy();
            leaveChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: ['Casual', 'Sick', 'Paid', 'Unpaid'], datasets: [{ data: [35, 28, 25, 12], backgroundColor: ['#540863', '#92487A', '#E49BA6', '#FFD3D5'], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } }, cutout: '60%' }
            });
        }
        
        function exportReport() { showToast('Report exported!', 'success'); }
        function printReport() { window.print(); }
        
        function showToast(message, type) { const toast = document.createElement('div'); toast.className = `toast ${type}`; toast.innerHTML = message; document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000); }
        function setActiveMenu(module) { setTimeout(() => { document.querySelectorAll('.nav-link').forEach(link => { link.classList.remove('active'); if(link.getAttribute('data-module') === module) link.classList.add('active'); }); }, 500); }
        
        document.addEventListener('DOMContentLoaded', function() { loadSidebar(); loadHeader(); setActiveMenu('reports'); updateChart(); });
    </script>
</body>
</html>
