<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Pay-Slips</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- html2pdf library for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        :root {
            --primary: #1B738C;
            --primary-light: #62C9EA;
            --primary-soft: #BDE4EE;
            --primary-bg-light: #e9f2f4;
            --button-hover: #166278;
            --border-color: #1B738C;
            --text-dark: #1B738C;
            --text-light: #5a7c8a;
        }


        body {
            background-color: #EBF4F6;
        }
       
        .section-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #49abcb;
            padding: 20px;
            margin-bottom: 20px;
        }

        .btn-primary {
            background-color: #1B738C;
            transition: all 0.3s ease;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
        }

        .btn-primary:hover {
            background-color: #18657a;
            transform: translateY(-1px);
        }

        .btn-outline {
            border: 1px solid #7fd8f0;
            color: #1B738C;
            padding: 8px 16px;
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
        }

        .btn-outline:hover {
            background-color: #1B738C;
            color: white;
        }

        .btn-success {
            background-color: #28a745;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
        }

        .btn-success:hover {
            background-color: #218838;
        }

        input,
        select {
            border: 1px solid #c99ebb;
            border-radius: 8px;
            padding: 8px 12px;
            width: 100%;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #1B738C;
            box-shadow: 0 0 0 2px #d8f1f8(84, 8, 99, 0.1);
        }

        label {
            font-size: 13px;
            font-weight: 500;
            color: #1B738C;
            margin-bottom: 4px;
            display: block;
        }

        .submodule-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #a3d9ec;
            flex-wrap: wrap;
        }

        .submodule-link {
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            background: transparent;
            color: #1B738C;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .submodule-link:hover {
            background-color: rgba(27, 115, 140, 0.1);
            color: #1B738C;
        }

        .submodule-link.active {
            background-color: #1B738C;
            color: white;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            z-index: 1100;
            animation: slideIn 0.3s ease;
        }

        .toast.success {
            background-color: #28a745;
        }

        .toast.error {
            background-color: #dc3545;
        }

        .toast.info {
            background-color: #17a2b8;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .main-content {
            margin-top: 64px;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: #f3eeef;
        }

        ::-webkit-scrollbar-thumb {
            background: #92487A;
            border-radius: 10px;
        }

        .payslip-card {
            background: white;
            border: 1px solid #56afc8;
            border-radius: 12px;
            padding: 16px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .payslip-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(27, 115, 140, 0.1);
        }

        /* Payslip Print Styles */
        .payslip-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
        }

        .payslip-header {
            text-align: center;
            border-bottom: 2px solid #c99ebb;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .payslip-title {
            font-size: 24px;
            font-weight: bold;
            color: #1B738C;
        }

        .payslip-subtitle {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .payslip-section {
            margin-bottom: 20px;
        }

        .payslip-section-title {
            font-size: 16px;
            font-weight: bold;
            color: #1B738C;
            border-left: 4px solid #7fcde3;
            padding-left: 10px;
            margin-bottom: 15px;
        }

        .payslip-table {
            width: 100%;
            border-collapse: collapse;
        }

        .payslip-table td,
        .payslip-table th {
            padding: 8px;
            border-bottom: 1px solid #e5e7eb;
        }

        .payslip-table th {
            text-align: left;
            font-weight: 600;
            color: #1B738C;
        }

        .amount {
            text-align: right;
        }

        .total-row {
            font-weight: bold;
            border-top: 2px solid #1B738C;
        }

        .net-salary {
            background: #f0fdf4;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-top: 20px;
        }

        .net-salary-amount {
            font-size: 28px;
            font-weight: bold;
            color: #28a745;
        }

        .payslip-footer {
            text-align: center;
            font-size: 10px;
            color: #999;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 24px;
        }

        @media (max-width: 768px) {
            .section-card {
                padding: 16px;
            }

            .submodule-link {
                padding: 6px 12px;
                font-size: 12px;
            }

            .modal-content {
                padding: 16px;
            }
        }
    </style>
</head>

<body >

    <div class="flex h-screen overflow-hidden">
        <div id="sidebar-container"></div>

        <div class="flex-1 flex flex-col overflow-hidden">
            <div id="header-container"></div>

            <main class="flex-1 overflow-y-auto p-5 main-content">

                <!-- Page Header -->
                <div class="mb-6">
                   <h1 class="text-2xl font-bold text-[var(--primary)]">Payroll Management</h1>
                    <p class="text-sm text-[#1B738C] mt-1">Manage salary structures &amp; process employee payroll.</p>
                 </div>
           

                <!-- Sub Navigation -->
                <div class="flex gap-2 pb-4 border-b border-[#62C9EA] mb-6 flex-wrap">
                    <a href="employee_payroll.html" class="submodule-link px-6 py-2 rounded-lg text-sm font-medium">Salary Structure</a>
                    <a href="#" class="submodule-link active px-6 py-2 rounded-lg text-sm font-medium">Payslips</a>
                </div>

                <!-- Filters -->
                <div class="section-card mb-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
                        <!-- Month -->
                        <div>
                            <label class="text-xs font-semibold text-[var(--primary)]">Select Month</label>
                            <select id="payslipMonth" onchange="filterPayslips()" 
                                    class="w-full px-4 py-2.5 border border-[#62C9EA] rounded-lg text-sm focus:outline-none">
                                <option value="January 2024">January 2024</option>
                                <option value="February 2024">February 2024</option>
                                <option value="March 2024">March 2024</option>
                                <option value="April 2024" selected>April 2024</option>
                                <option value="May 2024">May 2024</option>
                                <option value="June 2024">June 2024</option>
                            </select>
                        </div>

                        <!-- Employee -->
                        <div>
                            <label class="text-xs font-semibold text-[var(--primary)]">Select Employee</label>
                            <select id="payslipEmployee" onchange="filterPayslips()" 
                                    class="w-full px-4 py-2.5 border border-[#62C9EA] rounded-lg text-sm focus:outline-none">
                                <option value="all">All Employees</option>
                                <option value="Rajesh Kumar">Rajesh Kumar</option>
                                <option value="Priya Sharma">Priya Sharma</option>
                                <option value="Amit Mehta">Amit Mehta</option>
                                <option value="Neha Gupta">Neha Gupta</option>
                                <option value="Vikram Singh">Vikram Singh</option>
                                <option value="Sarah Johnson">Sarah Johnson</option>
                                <option value="Michael Brown">Michael Brown</option>
                            </select>
                        </div>

                        <!-- Search -->
                        <div>
                            <label class="text-xs font-semibold text-[var(--primary)]">Search</label>
                            <input type="text" id="payslipSearch" placeholder="Search by name..." 
                                   onkeyup="filterPayslips()"
                                   class="w-full px-4 py-2.5 border border-[#62C9EA] rounded-lg text-sm focus:outline-none">
                        </div>

                        <!-- Bulk Generate Button -->
                        <div class="flex items-end">
                            <button onclick="generateBulkPayslips()" 
                                    class="btn-primary w-full flex items-center justify-center gap-2 px-6 py-2.5 text-sm font-medium">
                                <i class="fas fa-download"></i> 
                                Generate Bulk PDF
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Payslips Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5" id="payslipsGrid">
                    <!-- Dynamically populated by JavaScript -->
                </div>

            </main>
        </div>
    </div>

    <!-- Payslip Modal -->
    <div id="payslipModal" class="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-semibold text-[var(--primary)]">Salary Slip</h3>
                <button onclick="closePayslipModal()" 
                        class="text-3xl leading-none text-gray-400 hover:text-[var(--primary)] transition-colors">
                    &times;
                </button>
            </div>
            
            <div id="payslipContent" class="mb-6"></div>

            <div class="flex justify-end gap-3">
                <button onclick="downloadPayslipPDF()" 
                        class="btn-primary flex items-center gap-2 px-6 py-2.5 text-sm font-medium">
                    <i class="fas fa-download"></i> 
                    Download PDF
                </button>
                <button onclick="printPayslip()" 
                        class="btn-outline flex items-center gap-2 px-6 py-2.5 text-sm font-medium">
                    <i class="fas fa-print"></i> 
                    Print
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../../assets/js/common.js"></script>
    <script src="../../assets/js/sidebar.js"></script>
    <script src="../../assets/js/header.js"></script>

    <script>
        // Employee salary data
        const employeeData = {
            'Rajesh Kumar': {
                basic: 30000, hra: 15000, allowances: 8000, otherAllow: 5000,
                pf: 1800, pt: 200, tds: 2500,
                dept: 'IT', designation: 'Senior Developer', id: 'EMP001',
                bank: 'HDFC Bank', account: 'XXXX1234', joiningDate: '2020-01-15'
            },
            'Priya Sharma': {
                basic: 28000, hra: 14000, allowances: 7000, otherAllow: 4000,
                pf: 1600, pt: 200, tds: 2200,
                dept: 'HR', designation: 'HR Manager', id: 'EMP002',
                bank: 'ICICI Bank', account: 'XXXX5678', joiningDate: '2019-06-10'
            },
            'Amit Mehta': {
                basic: 35000, hra: 17500, allowances: 10000, otherAllow: 6000,
                pf: 2100, pt: 200, tds: 3500,
                dept: 'Sales', designation: 'Sales Manager', id: 'EMP003',
                bank: 'SBI Bank', account: 'XXXX9012', joiningDate: '2018-03-20'
            },
            'Neha Gupta': {
                basic: 40000, hra: 20000, allowances: 12000, otherAllow: 8000,
                pf: 2400, pt: 200, tds: 4000,
                dept: 'Finance', designation: 'Finance Head', id: 'EMP004',
                bank: 'Axis Bank', account: 'XXXX3456', joiningDate: '2021-01-05'
            },
            'Vikram Singh': {
                basic: 38000, hra: 19000, allowances: 11000, otherAllow: 7000,
                pf: 2280, pt: 200, tds: 3800,
                dept: 'Operations', designation: 'Operations Head', id: 'EMP005',
                bank: 'HDFC Bank', account: 'XXXX7890', joiningDate: '2017-11-12'
            },
            'Sarah Johnson': {
                basic: 25000, hra: 12500, allowances: 5000, otherAllow: 3000,
                pf: 1500, pt: 200, tds: 1800,
                dept: 'Design', designation: 'UI/UX Designer', id: 'EMP006',
                bank: 'ICICI Bank', account: 'XXXX1111', joiningDate: '2022-02-01'
            },
            'Michael Brown': {
                basic: 32000, hra: 16000, allowances: 7000, otherAllow: 5000,
                pf: 1920, pt: 200, tds: 2800,
                dept: 'IT', designation: 'System Admin', id: 'EMP007',
                bank: 'SBI Bank', account: 'XXXX2222', joiningDate: '2021-08-15'
            }
        };

        let currentPayslipData = null;

        function calculateNetSalary(data) {
            const totalEarnings = data.basic + data.hra + data.allowances + data.otherAllow;
            const totalDeductions = data.pf + data.pt + data.tds;
            return totalEarnings - totalDeductions;
        }

        function numberToWords(num) {
            const ones = ['', 'One', 'Two', 'Three', 'Four', 'Five', 'Six', 'Seven', 'Eight', 'Nine', 'Ten',
                'Eleven', 'Twelve', 'Thirteen', 'Fourteen', 'Fifteen', 'Sixteen', 'Seventeen', 'Eighteen', 'Nineteen'];
            const tens = ['', '', 'Twenty', 'Thirty', 'Forty', 'Fifty', 'Sixty', 'Seventy', 'Eighty', 'Ninety'];

            function convertToWords(n) {
                if (n === 0) return 'Zero';
                if (n < 20) return ones[n];
                if (n < 100) return tens[Math.floor(n / 10)] + (n % 10 ? ' ' + ones[n % 10] : '');
                if (n < 1000) return ones[Math.floor(n / 100)] + ' Hundred' + (n % 100 ? ' ' + convertToWords(n % 100) : '');
                if (n < 100000) return convertToWords(Math.floor(n / 1000)) + ' Thousand' + (n % 1000 ? ' ' + convertToWords(n % 1000) : '');
                if (n < 10000000) return convertToWords(Math.floor(n / 100000)) + ' Lakh' + (n % 100000 ? ' ' + convertToWords(n % 100000) : '');
                return convertToWords(Math.floor(n / 10000000)) + ' Crore' + (n % 10000000 ? ' ' + convertToWords(n % 10000000) : '');
            }
            return convertToWords(num);
        }

        function generatePayslipCards() {
            const grid = document.getElementById('payslipsGrid');
            grid.innerHTML = '';

            Object.keys(employeeData).forEach(name => {
                const data = employeeData[name];
                const netSalary = calculateNetSalary(data);
                const month = document.getElementById('payslipMonth').value;

                const cardHTML = `
                    <div class="payslip-card" data-name="${name}" onclick="viewPayslip('${name}')">
                        <div class="flex justify-between items-start">
                            <div>
                                <div class="w-10 h-10 rounded-full bg-[#1B738C]/10 flex items-center justify-center">
                                    <i class="fas fa-user text-[#1B738C]"></i>
                                </div>
                                <h4 class="font-semibold mt-3 text-[var(--primary)]">${name}</h4>
                                <p class="text-xs text-gray-500">${data.designation} • ${data.dept}</p>
                            </div>
                            <i class="fas fa-download text-[var(--primary)] text-xl"></i>
                        </div>
                        <div class="mt-4 pt-3 border-t border-[#7fcde3] flex justify-between items-end">
                            <span class="text-xs text-gray-500">${month}</span>
                            <span class="text-lg font-bold text-green-600">₹${netSalary.toLocaleString()}</span>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        function viewPayslip(name) {
            const data = employeeData[name];
            if (!data) return;

            const month = document.getElementById('payslipMonth').value;
            const netSalary = calculateNetSalary(data);
            const totalEarnings = data.basic + data.hra + data.allowances + data.otherAllow;
            const totalDeductions = data.pf + data.pt + data.tds;
            const amountInWords = numberToWords(netSalary);

            currentPayslipData = { name, ...data, month, netSalary, totalEarnings, totalDeductions, amountInWords };

            const content = `
                <div id="payslipToPrint" class="payslip-container">
                    <div class="payslip-header">
                        <div class="payslip-title">HRMS ADMIN</div>
                        <div class="payslip-subtitle">Corporate Office, Mumbai, India - 400001</div>
                        <div class="payslip-subtitle">Email: hr@hrms.com | Phone: +91 +++++++++++++</div>
                        <div class="mt-4">
                            <span class="font-bold text-lg">SALARY SLIP FOR ${month.toUpperCase()}</span>
                        </div>
                    </div>
                    
                    <div class="payslip-section">
                        <div class="payslip-section-title">Employee Details</div>
                        <table class="payslip-table w-full">
                            <tr><th>Employee Name</th><td>${name}</td><th>Employee ID</th><td>${data.id}</td></tr>
                            <tr><th>Designation</th><td>${data.designation}</td><th>Department</th><td>${data.dept}</td></tr>
                            <tr><th>Joining Date</th><td>${data.joiningDate}</td><th>Payment Date</th><td>${new Date().toLocaleDateString()}</td></tr>
                            <tr><th>Bank Name</th><td>${data.bank}</td><th>Account Number</th><td>${data.account}</td></tr>
                        </table>
                    </div>
                    
                    <div class="payslip-section">
                        <div class="payslip-section-title">Earnings</div>
                        <table class="payslip-table w-full">
                            <tr><th>Particulars</th><th class="amount">Amount (₹)</th></tr>
                            <tr><td>Basic Salary</td><td class="amount">${data.basic.toLocaleString()}</td></tr>
                            <tr><td>House Rent Allowance (HRA)</td><td class="amount">${data.hra.toLocaleString()}</td></tr>
                            <tr><td>Conveyance Allowance</td><td class="amount">${data.allowances.toLocaleString()}</td></tr>
                            <tr><td>Special Allowance</td><td class="amount">${data.otherAllow.toLocaleString()}</td></tr>
                            <tr class="total-row"><td><strong>Total Earnings</strong></td><td class="amount"><strong>${totalEarnings.toLocaleString()}</strong></td></tr>
                        </table>
                    </div>
                    
                    <div class="payslip-section">
                        <div class="payslip-section-title">Deductions</div>
                        <table class="payslip-table w-full">
                            <tr><th>Particulars</th><th class="amount">Amount (₹)</th></tr>
                            <tr><td>Provident Fund (PF)</td><td class="amount">${data.pf.toLocaleString()}</td></tr>
                            <tr><td>Professional Tax (PT)</td><td class="amount">${data.pt.toLocaleString()}</td></tr>
                            <tr><td>Tax Deducted at Source (TDS)</td><td class="amount">${data.tds.toLocaleString()}</td></tr>
                            <tr class="total-row"><td><strong>Total Deductions</strong></td><td class="amount"><strong>${totalDeductions.toLocaleString()}</strong></td></tr>
                        </table>
                    </div>
                    
                    <div class="net-salary">
                        <div class="text-sm text-gray-600">Net Salary (Take Home)</div>
                        <div class="net-salary-amount">₹ ${netSalary.toLocaleString()}</div>
                        <div class="text-xs mt-2">${amountInWords} Only</div>
                    </div>
                    
                    <div class="payslip-footer">
                        <p>This is a computer generated salary slip and does not require signature.</p>
                        <p>For any discrepancies, please contact HR department within 7 days.</p>
                    </div>
                </div>
            `;

            document.getElementById('payslipContent').innerHTML = content;
            document.getElementById('payslipModal').classList.add('active');
        }

        function downloadPayslipPDF() {
            const element = document.getElementById('payslipToPrint');
            if (!element) return;

            const opt = {
                margin: [0.5, 0.5, 0.5, 0.5],
                filename: `Salary_Slip_${currentPayslipData?.name || 'Employee'}_${currentPayslipData?.month || ''}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save()
                .then(() => showToast('Payslip downloaded successfully!', 'success'))
                .catch(() => showToast('Error generating PDF!', 'error'));
        }

        function printPayslip() {
            const printContents = document.getElementById('payslipToPrint').innerHTML;
            const originalContents = document.body.innerHTML;

            document.body.innerHTML = printContents;
            window.print();
            document.body.innerHTML = originalContents;
            window.location.reload();
        }

        function generateBulkPayslips() {
            const employees = Object.keys(employeeData);
            showToast(`Generating ${employees.length} payslips...`, 'info');

            let completed = 0;
            employees.forEach((name, index) => {
                setTimeout(() => {
                    viewPayslip(name);
                    setTimeout(() => {
                        downloadPayslipPDF();
                        setTimeout(() => {
                            closePayslipModal();
                            completed++;
                            if (completed === employees.length) {
                                showToast(`${employees.length} payslips generated successfully!`, 'success');
                            }
                        }, 800);
                    }, 600);
                }, index * 2800);
            });
        }

        function filterPayslips() {
            const search = document.getElementById('payslipSearch').value.toLowerCase().trim();
            const selectedEmployee = document.getElementById('payslipEmployee').value.toLowerCase();
            const cards = document.querySelectorAll('.payslip-card');

            cards.forEach(card => {
                const name = card.getAttribute('data-name').toLowerCase();
                let show = true;

                if (search && !name.includes(search)) show = false;
                if (selectedEmployee !== 'all' && name !== selectedEmployee) show = false;

                card.style.display = show ? 'block' : 'none';
            });
        }

        function closePayslipModal() {
            document.getElementById('payslipModal').classList.remove('active');
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadSidebar();
            loadHeader();
