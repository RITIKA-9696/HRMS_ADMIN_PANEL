<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payslips | Payroll | HRMS Admin</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- html2pdf library for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f3eeef;
        }

        .section-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #5c003f;
            padding: 20px;
            margin-bottom: 20px;
        }

        .btn-primary {
            background-color: #540863;
            transition: all 0.3s ease;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
        }

        .btn-primary:hover {
            background-color: #92487A;
            transform: translateY(-1px);
        }

        .btn-outline {
            border: 1px solid #540863;
            color: #540863;
            padding: 8px 16px;
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
        }

        .btn-outline:hover {
            background-color: #540863;
            color: white;
        }

        .btn-success {
            background-color: #28a745;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
        }

        .btn-success:hover {
            background-color: #218838;
        }

        input,
        select {
            border: 1px solid #5c003f;
            border-radius: 8px;
            padding: 8px 12px;
            width: 100%;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #540863;
            box-shadow: 0 0 0 2px rgba(84, 8, 99, 0.1);
        }

        label {
            font-size: 13px;
            font-weight: 500;
            color: #540863;
            margin-bottom: 4px;
            display: block;
        }

        .submodule-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #5c003f;
            flex-wrap: wrap;
        }

        .submodule-link {
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            background: transparent;
            color: #92487A;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .submodule-link:hover {
            background-color: rgba(84, 8, 99, 0.1);
            color: #540863;
        }

        .submodule-link.active {
            background-color: #540863;
            color: white;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            z-index: 1100;
            animation: slideIn 0.3s ease;
        }

        .toast.success {
            background-color: #28a745;
        }

        .toast.error {
            background-color: #dc3545;
        }

        .toast.info {
            background-color: #17a2b8;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .main-content {
            margin-top: 64px;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: #f3eeef;
        }

        ::-webkit-scrollbar-thumb {
            background: #92487A;
            border-radius: 10px;
        }

        .payslip-card {
            background: white;
            border: 1px solid #5c003f;
            border-radius: 12px;
            padding: 16px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .payslip-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(84, 8, 99, 0.1);
        }

        /* Payslip Print Styles */
        .payslip-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
        }

        .payslip-header {
            text-align: center;
            border-bottom: 2px solid #540863;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .payslip-title {
            font-size: 24px;
            font-weight: bold;
            color: #540863;
        }

        .payslip-subtitle {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .payslip-section {
            margin-bottom: 20px;
        }

        .payslip-section-title {
            font-size: 16px;
            font-weight: bold;
            color: #540863;
            border-left: 4px solid #540863;
            padding-left: 10px;
            margin-bottom: 15px;
        }

        .payslip-table {
            width: 100%;
            border-collapse: collapse;
        }

        .payslip-table td,
        .payslip-table th {
            padding: 8px;
            border-bottom: 1px solid #e5e7eb;
        }

        .payslip-table th {
            text-align: left;
            font-weight: 600;
            color: #540863;
        }

        .amount {
            text-align: right;
        }

        .total-row {
            font-weight: bold;
            border-top: 2px solid #540863;
        }

        .net-salary {
            background: #f0fdf4;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-top: 20px;
        }

        .net-salary-amount {
            font-size: 28px;
            font-weight: bold;
            color: #28a745;
        }

        .payslip-footer {
            text-align: center;
            font-size: 10px;
            color: #999;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 24px;
        }

        @media (max-width: 768px) {
            .section-card {
                padding: 16px;
            }

            .submodule-link {
                padding: 6px 12px;
                font-size: 12px;
            }

            .modal-content {
                padding: 16px;
            }
        }
    </style>
</head>

<body class="bg-[#f3eeef]">

    <div class="flex h-screen overflow-hidden">
        <div id="sidebar-container"></div>

        <div class="flex-1 flex flex-col overflow-hidden">
            <div id="header-container"></div>

            <main class="flex-1 overflow-y-auto p-5 main-content">

                <div class="mb-4">
                    <h1 class="text-xl font-bold" style="color: #540863;">Payroll Management</h1>
                    <p class="text-xs mt-0.5" style="color: #92487A;">Manage salary structure, deductions, run payroll
                        and generate payslips</p>
                </div>

                <div class="submodule-nav">
                    <a href="structure.html" class="submodule-link">💰 Salary Structure</a>
                    <a href="deductions.html" class="submodule-link">📉 Deductions</a>
                    <a href="run.html" class="submodule-link">⚙️ Run Payroll</a>
                    <a href="payslips.html" class="submodule-link active">📄 Payslips</a>
                </div>

                <!-- Filters -->
                <div class="section-card">
                    <div class="form-row">
                        <div>
                            <label>Select Month</label>
                            <select id="payslipMonth" onchange="filterPayslips()">
                                <option value="January 2024">January 2024</option>
                                <option value="February 2024">February 2024</option>
                                <option value="March 2024">March 2024</option>
                                <option value="April 2024" selected>April 2024</option>
                                <option value="May 2024">May 2024</option>
                                <option value="June 2024">June 2024</option>
                            </select>
                        </div>
                        <div>
                            <label>Select Employee</label>
                            <select id="payslipEmployee" onchange="filterPayslips()">
                                <option value="all">All Employees</option>
                                <option value="Rajesh Kumar">Rajesh Kumar</option>
                                <option value="Priya Sharma">Priya Sharma</option>
                                <option value="Amit Mehta">Amit Mehta</option>
                                <option value="Neha Gupta">Neha Gupta</option>
                                <option value="Vikram Singh">Vikram Singh</option>
                                <option value="Sarah Johnson">Sarah Johnson</option>
                                <option value="Michael Brown">Michael Brown</option>
                            </select>
                        </div>
                        <div>
                            <label>Search</label>
                            <input type="text" id="payslipSearch" placeholder="Search by name..." onkeyup="filterPayslips()">
                        </div>
                        <div class="flex items-end">
                            <button onclick="generateBulkPayslips()" class="btn-primary w-full">
                                <i class="fas fa-download mr-1"></i>Generate Bulk PDF
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Payslips Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="payslipsGrid">
                    <!-- Payslip cards will be populated by JavaScript -->
                </div>

            </main>
        </div>
    </div>

    <!-- Payslip Modal -->
    <div id="payslipModal" class="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold" style="color:#540863;">Salary Slip</h3>
                <button onclick="closePayslipModal()" class="text-gray-500 text-xl hover:text-gray-700">&times;</button>
            </div>
            <div id="payslipContent"></div>
            <div class="flex justify-end gap-2 mt-4">
                <button onclick="downloadPayslipPDF()" class="btn-primary">
                    <i class="fas fa-download mr-1"></i>Download PDF
                </button>
                <button onclick="printPayslip()" class="btn-outline">
                    <i class="fas fa-print mr-1"></i>Print
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../../assets/js/common.js"></script>
    <script src="../../assets/js/sidebar.js"></script>
    <script src="../../assets/js/header.js"></script>

    <script>
        // Employee salary data
        const employeeData = {
            'Rajesh Kumar': {
                basic: 30000, hra: 15000, allowances: 8000, otherAllow: 5000,
                pf: 1800, pt: 200, tds: 2500,
                dept: 'IT', designation: 'Senior Developer', id: 'EMP001',
                bank: 'HDFC Bank', account: 'XXXX1234', joiningDate: '2020-01-15'
            },
            'Priya Sharma': {
                basic: 28000, hra: 14000, allowances: 7000, otherAllow: 4000,
                pf: 1600, pt: 200, tds: 2200,
                dept: 'HR', designation: 'HR Manager', id: 'EMP002',
                bank: 'ICICI Bank', account: 'XXXX5678', joiningDate: '2019-06-10'
            },
            'Amit Mehta': {
                basic: 35000, hra: 17500, allowances: 10000, otherAllow: 6000,
                pf: 2100, pt: 200, tds: 3500,
                dept: 'Sales', designation: 'Sales Manager', id: 'EMP003',
                bank: 'SBI Bank', account: 'XXXX9012', joiningDate: '2018-03-20'
            },
            'Neha Gupta': {
                basic: 40000, hra: 20000, allowances: 12000, otherAllow: 8000,
                pf: 2400, pt: 200, tds: 4000,
                dept: 'Finance', designation: 'Finance Head', id: 'EMP004',
                bank: 'Axis Bank', account: 'XXXX3456', joiningDate: '2021-01-05'
            },
            'Vikram Singh': {
                basic: 38000, hra: 19000, allowances: 11000, otherAllow: 7000,
                pf: 2280, pt: 200, tds: 3800,
                dept: 'Operations', designation: 'Operations Head', id: 'EMP005',
                bank: 'HDFC Bank', account: 'XXXX7890', joiningDate: '2017-11-12'
            },
            'Sarah Johnson': {
                basic: 25000, hra: 12500, allowances: 5000, otherAllow: 3000,
                pf: 1500, pt: 200, tds: 1800,
                dept: 'Design', designation: 'UI/UX Designer', id: 'EMP006',
                bank: 'ICICI Bank', account: 'XXXX1111', joiningDate: '2022-02-01'
            },
            'Michael Brown': {
                basic: 32000, hra: 16000, allowances: 7000, otherAllow: 5000,
                pf: 1920, pt: 200, tds: 2800,
                dept: 'IT', designation: 'System Admin', id: 'EMP007',
                bank: 'SBI Bank', account: 'XXXX2222', joiningDate: '2021-08-15'
            }
        };

        let currentPayslipData = null;

        // Calculate net salary
        function calculateNetSalary(data) {
            const totalEarnings = data.basic + data.hra + data.allowances + data.otherAllow;
            const totalDeductions = data.pf + data.pt + data.tds;
            return totalEarnings - totalDeductions;
        }

        // Number to Words Converter
        function numberToWords(num) {
            const ones = ['', 'One', 'Two', 'Three', 'Four', 'Five', 'Six', 'Seven', 'Eight', 'Nine', 'Ten',
                'Eleven', 'Twelve', 'Thirteen', 'Fourteen', 'Fifteen', 'Sixteen', 'Seventeen', 'Eighteen', 'Nineteen'];
            const tens = ['', '', 'Twenty', 'Thirty', 'Forty', 'Fifty', 'Sixty', 'Seventy', 'Eighty', 'Ninety'];

            function convertToWords(n) {
                if (n === 0) return 'Zero';
                if (n < 20) return ones[n];
                if (n < 100) return tens[Math.floor(n / 10)] + (n % 10 ? ' ' + ones[n % 10] : '');
                if (n < 1000) return ones[Math.floor(n / 100)] + ' Hundred' + (n % 100 ? ' ' + convertToWords(n % 100) : '');
                if (n < 100000) return convertToWords(Math.floor(n / 1000)) + ' Thousand' + (n % 1000 ? ' ' + convertToWords(n % 1000) : '');
                if (n < 10000000) return convertToWords(Math.floor(n / 100000)) + ' Lakh' + (n % 100000 ? ' ' + convertToWords(n % 100000) : '');
                return convertToWords(Math.floor(n / 10000000)) + ' Crore' + (n % 10000000 ? ' ' + convertToWords(n % 10000000) : '');
            }
            return convertToWords(num);
        }

        // Generate payslip cards
        function generatePayslipCards() {
            const grid = document.getElementById('payslipsGrid');
            if (!grid) return;
            
            grid.innerHTML = '';
            
            Object.keys(employeeData).forEach(name => {
                const data = employeeData[name];
                const netSalary = calculateNetSalary(data);
                const month = document.getElementById('payslipMonth').value;
                
                const card = document.createElement('div');
                card.className = 'payslip-card';
                card.setAttribute('data-name', name);
                card.setAttribute('onclick', `viewPayslip('${name}')`);
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="w-10 h-10 rounded-full bg-[#540863]/10 flex items-center justify-center">
                                <i class="fas fa-user text-[#540863]"></i>
                            </div>
                            <h4 class="font-semibold mt-2" style="color:#540863;">${name}</h4>
                            <p class="text-xs text-gray-500">${data.designation} - ${data.dept}</p>
                        </div>
                        <i class="fas fa-download text-[#540863] text-xl"></i>
                    </div>
                    <div class="mt-3 pt-2 border-t flex justify-between">
                        <span class="text-xs text-gray-500">${month}</span>
                        <span class="text-sm font-bold" style="color:#28a745;">₹${netSalary.toLocaleString()}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // View payslip
        function viewPayslip(name) {
            const data = employeeData[name];
            if (!data) return;

            const month = document.getElementById('payslipMonth').value;
            const netSalary = calculateNetSalary(data);
            const totalEarnings = data.basic + data.hra + data.allowances + data.otherAllow;
            const totalDeductions = data.pf + data.pt + data.tds;
            const amountInWords = numberToWords(netSalary);

            currentPayslipData = { name, ...data, month, netSalary, totalEarnings, totalDeductions, amountInWords };

            const content = `
                <div id="payslipToPrint" class="payslip-container">
                    <div class="payslip-header">
                        <div class="payslip-title">HRMS ADMIN</div>
                        <div class="payslip-subtitle">Corporate Office, Mumbai, India - 400001</div>
                        <div class="payslip-subtitle">Email: hr@hrms.com | Phone: +91 98765 43210</div>
                        <div style="margin-top: 10px;">
                            <span style="font-size: 14px; font-weight: bold;">SALARY SLIP FOR ${month.toUpperCase()}</span>
                        </div>
                    </div>
                    
                    <div class="payslip-section">
                        <div class="payslip-section-title">Employee Details</div>
                        <table class="payslip-table">
                            <tr><th style="width: 150px;">Employee Name</th><td>${name}</td><th>Employee ID</th><td>${data.id}</td></tr>
                            <tr><th>Designation</th><td>${data.designation}</td><th>Department</th><td>${data.dept}</td></tr>
                            <tr><th>Joining Date</th><td>${data.joiningDate}</td><th>Payment Date</th><td>${new Date().toLocaleDateString()}</td></tr>
                            <tr><th>Bank Name</th><td>${data.bank}</td><th>Account Number</th><td>${data.account}</td></tr>
                        </table>
                    </div>
                    
                    <div class="payslip-section">
                        <div class="payslip-section-title">Earnings</div>
                        <table class="payslip-table">
                            <tr><th>Particulars</th><th class="amount">Amount (₹)</th></tr>
                            <tr><td>Basic Salary</td><td class="amount">${data.basic.toLocaleString()}</td></tr>
                            <tr><td>House Rent Allowance (HRA)</td><td class="amount">${data.hra.toLocaleString()}</td></tr>
                            <tr><td>Conveyance Allowance</td><td class="amount">${data.allowances.toLocaleString()}</td></tr>
                            <tr><td>Special Allowance</td><td class="amount">${data.otherAllow.toLocaleString()}</td></tr>
                            <tr class="total-row"><td><strong>Total Earnings</strong></td><td class="amount"><strong>${totalEarnings.toLocaleString()}</strong></td></tr>
                        </table>
                    </div>
                    
                    <div class="payslip-section">
                        <div class="payslip-section-title">Deductions</div>
                        <table class="payslip-table">
                            <tr><th>Particulars</th><th class="amount">Amount (₹)</th></tr>
                            <tr><td>Provident Fund (PF)</td><td class="amount">${data.pf.toLocaleString()}</td></tr>
                            <tr><td>Professional Tax (PT)</td><td class="amount">${data.pt.toLocaleString()}</td></tr>
                            <tr><td>Tax Deducted at Source (TDS)</td><td class="amount">${data.tds.toLocaleString()}</td></tr>
                            <tr class="total-row"><td><strong>Total Deductions</strong></td><td class="amount"><strong>${totalDeductions.toLocaleString()}</strong></td></tr>
                        </table>
                    </div>
                    
                    <div class="net-salary">
                        <div style="font-size: 14px; color: #666;">Net Salary (Take Home)</div>
                        <div class="net-salary-amount">₹ ${netSalary.toLocaleString()}</div>
                        <div style="font-size: 11px; margin-top: 5px;">${amountInWords} Only</div>
                    </div>
                    
                    <div class="payslip-footer">
                        <p>This is a computer generated salary slip and does not require signature.</p>
                        <p>For any discrepancies, please contact HR department within 7 days.</p>
                    </div>
                </div>
            `;

            document.getElementById('payslipContent').innerHTML = content;
            document.getElementById('payslipModal').classList.add('active');
        }

        // Download PDF
        function downloadPayslipPDF() {
            const element = document.getElementById('payslipToPrint');
            if (!element) {
                showToast('Payslip content not found!', 'error');
                return;
            }

            showToast('Generating PDF...', 'info');

            const opt = {
                margin: [0.5, 0.5, 0.5, 0.5],
                filename: `Salary_Slip_${currentPayslipData?.name}_${currentPayslipData?.month}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, letterRendering: true },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save()
                .then(() => {
                    showToast('Payslip downloaded successfully!', 'success');
                })
                .catch((err) => {
                    console.error('PDF Error:', err);
                    showToast('Error generating PDF!', 'error');
                });
        }

        

        // Bulk PDF Generation
        function generateBulkPayslips() {
            const employees = Object.keys(employeeData);
            showToast(`Generating ${employees.length} payslips...`, 'info');

            let completed = 0;
            employees.forEach((name, index) => {
                setTimeout(() => {
                    viewPayslip(name);
                    setTimeout(() => {
                        downloadPayslipPDF();
                        setTimeout(() => closePayslipModal(), 1500);
                        completed++;
                        if (completed === employees.length) {
                            showToast(`${employees.length} payslips generated successfully!`, 'success');
                        }
                    }, 500);
                }, index * 3000);
            });
        }

        // Filter payslips
        function filterPayslips() {
            const search = document.getElementById('payslipSearch').value.toLowerCase();
            const employee = document.getElementById('payslipEmployee').value;
            const cards = document.querySelectorAll('.payslip-card');

            cards.forEach(card => {
                let show = true;
                const name = card.getAttribute('data-name')?.toLowerCase();
                if (search && !name?.includes(search)) show = false;
                if (employee !== 'all' && name !== employee.toLowerCase()) show = false;
                card.style.display = show ? '' : 'none';
            });
        }

        function closePayslipModal() {
            document.getElementById('payslipModal').classList.remove('active');
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function setActiveMenu(module) {
            setTimeout(() => {
                document.querySelectorAll('.nav-link').forEach(link => {
                    link.classList.remove('active');
                    if (link.getAttribute('data-module') === module) link.classList.add('active');
                });
            }, 500);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadSidebar();
            loadHeader();
            setActiveMenu('payroll');
            generatePayslipCards();
        });
    </script>
</body>

</html>
