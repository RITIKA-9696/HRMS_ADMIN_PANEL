<!-- Common Header with New Color Theme -->
<header class="main-header h-14 flex items-center justify-between px-6 fixed top-0 right-0 left-0 z-40 bg-white shadow-sm" style="left: 256px; border-bottom: 1px solid #92487A; transition: left 0.3s ease;">
    <!-- Left Side -->
    <div class="flex items-center gap-4">
        
        
    </div>
    
    <!-- Right Side -->
    <div class="flex items-center gap-4">
        <!-- Notification -->
        <div class="relative">
            <button id="notificationBtn" class="transition-all relative" style="color: #c99ebb;">
                <i class="fas fa-bell text-xl"></i>
                <span class="absolute -top-1 -right-2 text-white text-xs rounded-full w-4 h-4 flex items-center justify-center" style="background-color: #540863;">3</span>
            </button>
            <div id="notificationMenu" class="dropdown-menu hidden absolute right-0 mt-2 w-80 bg-white rounded-xl shadow-lg border z-50" style="border-color: #92487A;">
                <div class="p-4 border-b" style="border-color: #92487A;">
                    <h4 class="font-semibold" style="color: #540863;">Notifications</h4>
                </div>
                <div class="max-h-96 overflow-y-auto">
                    <div class="p-3 hover:bg-[#FFD3D5] cursor-pointer transition-all">
                        <p class="text-sm" style="color: #540863;">New leave request from Elena</p>
                        <p class="text-xs mt-1" style="color: #92487A;">2 hours ago</p>
                    </div>
                    <div class="p-3 hover:bg-[#FFD3D5] cursor-pointer transition-all">
                        <p class="text-sm" style="color: #540863;">Payroll for March processed</p>
                        <p class="text-xs mt-1" style="color: #92487A;">Yesterday</p>
                    </div>
                </div>
                <div class="p-3 border-t text-center" style="border-color: #92487A;">
                    <a href="#" class="text-sm" style="color: #540863;">View all notifications</a>
                </div>
            </div>
        </div>
        
        <!-- User Menu -->
        <div class="relative">
            <button id="userBtn" class="flex items-center gap-3 px-3 py-1.5 rounded-lg transition-all hover:bg-[#FFD3D5]">
                <div class="w-8 h-8 rounded-full flex items-center justify-center" style="background-color: #540863;">
                    <span class="text-white text-sm font-medium">RK</span>
                </div>
                <div class="hidden md:block text-left">
                    <p class="text-sm font-semibold" style="color: #540863;">Rajesh Kumar</p>
                    <p class="text-xs" style="color: #92487A;">Super Admin</p>
                </div>
                <i class="fas fa-chevron-down text-xs hidden md:block" style="color: #540863;"></i>
            </button>
            <div id="userMenu" class="dropdown-menu hidden absolute right-0 mt-2 w-56 bg-white rounded-xl shadow-lg border z-50" style="border-color: #c99ebb;">
                <div class="p-3 border-b" style="border-color: #c99ebb">
                    <p class="text-sm font-semibold" style="color: #540863;">Rajesh Kumar</p>
                    <p class="text-xs" style="color: #92487A;">rajesh@hrms.com</p>
                </div>
                <!-- <div class="py-2">
                    <a href="#" class="flex items-center gap-3 px-4 py-2 text-sm transition-all hover:bg-[#FFD3D5]" style="color: #540863;">
                        <i class="fas fa-user w-4" style="color: #540863;"></i> My Profile
                    </a>
                    <a href="#" class="flex items-center gap-3 px-4 py-2 text-sm transition-all hover:bg-[#FFD3D5]" style="color: #540863;">
                        <i class="fas fa-cog w-4" style="color: #540863;"></i> Settings
                    </a>
                    <a href="#" class="flex items-center gap-3 px-4 py-2 text-sm transition-all hover:bg-[#FFD3D5]" style="color: #540863;">
                        <i class="fas fa-shield-alt w-4" style="color: #540863;"></i> Change Password
                    </a>
                </div> -->
                <div class="border-t pt-2" style="border-color: #c99ebb">
                    <a href="#" id="logoutBtn" class="flex items-center gap-3 px-4 py-2 text-sm transition-all hover:bg-[#FFD3D5]" style="color: #e74c3c;">
                        <i class="fas fa-sign-out-alt w-4"></i> Logout
                    </a>
                </div>
            </div>
        </div>
    </div>
</header>

<!-- Logout Confirmation Modal -->
<div id="logoutModal" class="logout-modal" style="display: none;">
    <div class="logout-modal-overlay"></div>
    <div class="logout-modal-content">
        <div class="text-center">
            <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-red-100 flex items-center justify-center">
                <i class="fas fa-sign-out-alt text-2xl text-red-500"></i>
            </div>
            <h3 class="text-xl font-semibold mb-2" style="color: #540863;">Confirm Logout</h3>
            <p class="text-sm text-gray-500 mb-6">Are you sure you want to logout? You will need to login again to access the dashboard.</p>
            <div class="flex justify-center gap-3">
                <button id="cancelLogoutBtn" class="px-5 py-2 rounded-lg border transition-all duration-300" style="border-color: #5c003f; color: #540863;">Cancel</button>
                <button id="confirmLogoutBtn" class="px-5 py-2 rounded-lg text-white transition-all duration-300" style="background-color: #dc3545;">Yes, Logout</button>
            </div>
        </div>
    </div>
</div>

<style>
    .dropdown-menu {
        display: none;
    }
    
    .dropdown-menu.show {
        display: block;
    }
    
    /* Adjust header when sidebar is collapsed */
    .main-sidebar.collapsed ~ .flex-1 .main-header,
    .main-sidebar.collapsed ~ .flex-1 header {
        left: 70px !important;
    }
    
    header {
        transition: left 0.3s ease;
    }
    
    /* Logout Modal Styles */
    .logout-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 2000;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .logout-modal-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(3px);
    }
    
    .logout-modal-content {
        position: relative;
        background: white;
        border-radius: 20px;
        padding: 30px;
        max-width: 400px;
        width: 90%;
        box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.2);
        animation: modalFadeIn 0.3s ease-out;
        border: 1px solid #5c003f;
    }
    
    @keyframes modalFadeIn {
        from {
            opacity: 0;
            transform: scale(0.95);
        }
        to {
            opacity: 1;
            transform: scale(1);
        }
    }
    
    .logout-modal-content button {
        cursor: pointer;
        font-weight: 500;
    }
    
    .logout-modal-content button:hover {
        transform: translateY(-1px);
    }
    
    #cancelLogoutBtn:hover {
        background-color: rgba(84, 8, 99, 0.1);
    }
    
    #confirmLogoutBtn:hover {
        background-color: #c82333;
    }
</style>

<script>
    // Function to update header position based on sidebar state
    function updateHeaderPosition() {
        const sidebar = document.querySelector('.main-sidebar');
        const header = document.querySelector('.main-header');
        if (sidebar && header) {
            if (sidebar.classList.contains('collapsed')) {
                header.style.left = '70px';
            } else {
                header.style.left = '256px';
            }
        }
    }
    
    // Dropdown toggle functionality
    document.addEventListener('DOMContentLoaded', function() {
        const notificationBtn = document.getElementById('notificationBtn');
        const notificationMenu = document.getElementById('notificationMenu');
        const userBtn = document.getElementById('userBtn');
        const userMenu = document.getElementById('userMenu');
        const logoutBtn = document.getElementById('logoutBtn');
        const logoutModal = document.getElementById('logoutModal');
        const cancelLogoutBtn = document.getElementById('cancelLogoutBtn');
        const confirmLogoutBtn = document.getElementById('confirmLogoutBtn');
        
        // Notification dropdown
        if (notificationBtn && notificationMenu) {
            notificationBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                notificationMenu.classList.toggle('show');
                if (userMenu) userMenu.classList.remove('show');
            });
        }
        
        // User dropdown
        if (userBtn && userMenu) {
            userBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                userMenu.classList.toggle('show');
                if (notificationMenu) notificationMenu.classList.remove('show');
            });
        }
        
        // Close dropdowns when clicking outside
        document.addEventListener('click', function() {
            if (notificationMenu) notificationMenu.classList.remove('show');
            if (userMenu) userMenu.classList.remove('show');
        });
        
        // ========== LOGOUT FUNCTIONALITY WITH MODAL ==========
        
        // Open logout modal when logout button is clicked
        if (logoutBtn) {
            logoutBtn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                logoutModal.style.display = 'flex';
                // Close user menu when modal opens
                if (userMenu) userMenu.classList.remove('show');
            });
        }
        
        // Close modal on cancel
        if (cancelLogoutBtn) {
            cancelLogoutBtn.addEventListener('click', function() {
                logoutModal.style.display = 'none';
            });
        }
        
        // Close modal when clicking on overlay
        const overlay = document.querySelector('.logout-modal-overlay');
        if (overlay) {
            overlay.addEventListener('click', function() {
                logoutModal.style.display = 'none';
            });
        }
        
        // Confirm logout
        if (confirmLogoutBtn) {
            confirmLogoutBtn.addEventListener('click', function() {
                // Clear all session and local storage
                localStorage.clear();
                sessionStorage.clear();
                
                // Redirect to login page
                window.location.href = '/index.html';
            });
        }
        
        // Listen for sidebar collapse events
        const observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                if (mutation.attributeName === 'class') {
                    updateHeaderPosition();
                }
            });
        });
        
        const sidebar = document.querySelector('.main-sidebar');
        if (sidebar) {
            observer.observe(sidebar, { attributes: true });
            updateHeaderPosition();
        }
        
        // Also listen for storage events (in case sidebar state changes from another tab)
        window.addEventListener('storage', function(e) {
            if (e.key === 'sidebarCollapsed') {
                updateHeaderPosition();
            }
        });
        
        // Initial position update
        updateHeaderPosition();
    });
</script>
